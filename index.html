<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>複值&quot;代班時數&quot;查詢系統</title>
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0d0f12">
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="台電排班">
  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    :root {
      --bg-body:#07090d; --bg-card:rgba(10,13,19,.78); --bg-input:rgba(18,22,30,.92);
      --text-main:#eef7ff; --text-dim:#95a3b8; --border-color:rgba(0,242,255,.32); --border-sub:rgba(255,255,255,.08);
      --neon-glow:0 0 10px rgba(0,242,255,.78),0 0 28px rgba(0,242,255,.38);
      --neon-shadow:0 20px 80px rgba(0,0,0,.42),inset 0 0 34px rgba(0,242,255,.06),0 0 28px rgba(0,242,255,.12);
      --surface-glass:rgba(15,23,34,.68); --surface-veil:rgba(7,10,15,.74);
      --start:#00F2FF; --ok:#39FF14; --pivot:#FF8C00; --alert:#FF3B3B;
      --color-A:#00F2FF; --color-B:#39FF14; --color-C:#FF8C00; --color-D:#FFE45E; --color-Alert:#FF3B3B;
      --ring-soft:rgba(255,255,255,.16);
    }
    body.light-mode {
      --bg-body:#eef3f8; --bg-card:rgba(255,255,255,.82); --bg-input:rgba(248,250,252,.96);
      --text-main:#0f172a; --text-dim:#64748b; --border-color:rgba(8,145,178,.32); --border-sub:rgba(15,23,42,.10);
      --neon-glow:0 6px 22px rgba(8,145,178,.16); --neon-shadow:0 18px 46px rgba(15,23,42,.12),inset 0 1px 0 rgba(255,255,255,.82);
      --surface-glass:rgba(255,255,255,.72); --surface-veil:rgba(255,255,255,.68);
      --start:#0891b2; --ok:#16a34a; --pivot:#ea580c; --alert:#dc2626;
      --color-A:#0891b2; --color-B:#16a34a; --color-C:#ea580c; --color-D:#b7791f; --color-Alert:#dc2626;
      --ring-soft:rgba(15,23,42,.14);
    }
    @font-face { font-family:'RemachineScript'; src:url('./RemachineScript_Personal_Use.ttf') format('truetype'); }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{
      min-height:100vh; margin:0; color:var(--text-main); overflow-x:hidden;
      font-family:Inter,ui-sans-serif,-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
      background:radial-gradient(circle at 10% 8%,rgba(0,242,255,.18),transparent 30%),radial-gradient(circle at 86% 18%,rgba(57,255,20,.10),transparent 26%),radial-gradient(circle at 75% 92%,rgba(255,59,59,.13),transparent 32%),linear-gradient(135deg,var(--bg-body),#111827 52%,var(--bg-body));
      transition:background-color .35s ease,color .35s ease;
    }
    body.light-mode{background:radial-gradient(circle at 12% 8%,rgba(8,145,178,.16),transparent 34%),radial-gradient(circle at 82% 14%,rgba(22,163,74,.10),transparent 28%),radial-gradient(circle at 72% 92%,rgba(220,38,38,.08),transparent 34%),linear-gradient(135deg,#edf2f7,#fff 48%,#e2e8f0)}
    body:before{content:'';position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.028) 1px,transparent 1px);background-size:42px 42px;mask-image:linear-gradient(to bottom,rgba(0,0,0,.65),transparent 82%);opacity:.45;z-index:0}
    body.light-mode:before{opacity:.26}
    .app-shell{position:relative;z-index:1;width:min(100%,1280px);padding:18px 10px 34px;margin:0 auto;perspective:1100px}
    @media (min-width:768px){.app-shell{padding:32px 24px 52px}}
    .hero-panel,.flow-panel,.restriction-panel{position:relative;overflow:hidden;border:1px solid var(--border-color);border-radius:30px;background:linear-gradient(135deg,rgba(0,242,255,.13),transparent 28%),linear-gradient(100deg,var(--surface-glass),var(--surface-veil));box-shadow:var(--neon-shadow);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
    .hero-panel:after{content:'';position:absolute;inset:-1px;pointer-events:none;background:linear-gradient(120deg,transparent 0%,rgba(255,255,255,.14) 18%,transparent 34%,transparent 100%);transform:translateX(-62%);animation:lightSweep 8s ease-in-out infinite}
    .neon-text{color:var(--start);text-shadow:var(--neon-glow)}
    .time-anchor{border:1px solid var(--border-color);background:linear-gradient(135deg,rgba(0,242,255,.14),rgba(255,255,255,.04)),var(--surface-glass);border-radius:24px;box-shadow:0 0 34px rgba(0,242,255,.10),inset 0 1px 0 rgba(255,255,255,.10);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px)}
    .field-shell label{display:block;margin-bottom:8px;color:var(--text-dim);font-weight:900;font-size:12px;letter-spacing:.18em}
    .chrono-input{width:100%;min-height:48px;border-radius:16px;border:1px solid var(--border-color);background:var(--bg-input);color:var(--text-main);outline:none;text-align:center;font-weight:950;font-size:18px;font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-variant-numeric:tabular-nums;letter-spacing:.08em;box-shadow:inset 0 0 22px rgba(0,242,255,.045);transition:transform .22s ease,border-color .22s ease,box-shadow .22s ease}
    .chrono-input:focus{transform:translateY(-1px);border-color:var(--start);box-shadow:0 0 0 4px rgba(0,242,255,.12),0 0 22px rgba(0,242,255,.18)}
    .btn-toggle-inline{width:44px;height:44px;display:inline-flex;align-items:center;justify-content:center;border-radius:999px;border:1px solid var(--border-color);background:var(--surface-glass);color:var(--text-main);cursor:pointer;font-size:1.05rem;box-shadow:var(--neon-shadow);transition:transform .24s ease,box-shadow .24s ease,border-color .24s ease}
    .btn-toggle-inline:hover{transform:translateY(-2px) scale(1.04);border-color:var(--start);box-shadow:0 0 28px rgba(0,242,255,.20)}
    .manual-panel{border:1px solid rgba(255,59,59,.34);border-radius:22px;background:linear-gradient(135deg,rgba(255,59,59,.12),rgba(255,140,0,.055));box-shadow:inset 0 0 22px rgba(255,59,59,.05)}
    .notice-line{border-left:3px solid var(--pivot);color:var(--pivot);background:linear-gradient(90deg,rgba(255,140,0,.10),transparent);border-radius:16px}
    .flow-panel{background:linear-gradient(180deg,rgba(255,255,255,.075),transparent 42%),var(--surface-glass);transform-style:preserve-3d}
    .flow-panel:before{content:'';position:absolute;inset:0;pointer-events:none;background:radial-gradient(circle at 18% 0%,rgba(0,242,255,.16),transparent 36%)}
    .shift-card{position:relative;isolation:isolate;overflow:hidden;border:1px solid var(--ring-soft);border-radius:24px;background:linear-gradient(135deg,rgba(255,255,255,.092),rgba(255,255,255,.028)),rgba(10,14,20,.40);box-shadow:0 14px 40px rgba(0,0,0,.20),inset 0 1px 0 rgba(255,255,255,.10);backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);animation:staggerFade .4s cubic-bezier(.22,1,.36,1) both;transition:transform .26s cubic-bezier(.22,1,.36,1),border-color .26s ease,box-shadow .26s ease}
    body.light-mode .shift-card{background:rgba(255,255,255,.72)}
    .shift-card:hover{transform:translateY(-4px) scale(1.02);border-color:var(--accent);box-shadow:0 20px 54px rgba(0,0,0,.24),0 0 34px var(--accentGlow),inset 0 1px 0 rgba(255,255,255,.18)}
    .shift-card:before{content:'';position:absolute;inset:0;z-index:-1;background:radial-gradient(circle at 8% 22%,var(--accentAura),transparent 42%);opacity:.9}
    .shift-card:after{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.86}
    .shift-badge{display:inline-flex;align-items:center;justify-content:center;min-width:74px;height:62px;padding:0 18px;border-radius:20px;font-size:34px;line-height:1;font-weight:1000;border:2px solid currentColor;background:rgba(0,0,0,.08);box-shadow:0 0 24px var(--accentGlow),inset 0 0 16px var(--accentAura);font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-variant-numeric:tabular-nums}
    .color-A{color:var(--color-A);border-color:var(--color-A)} .color-B{color:var(--color-B);border-color:var(--color-B)} .color-C{color:var(--color-C);border-color:var(--color-C)} .color-D{color:var(--color-D);border-color:var(--color-D)} .color-Alert{color:var(--color-Alert)}
    .status-pill{display:inline-flex;align-items:center;gap:8px;border-radius:999px;padding:8px 13px;border:1px solid currentColor;background:rgba(255,255,255,.055);font-size:12px;font-weight:900;letter-spacing:.12em}
    .numeric-data{font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;font-variant-numeric:tabular-nums;letter-spacing:.06em;line-height:1.05}
    .holiday-chip{display:inline-flex;align-items:center;width:100%;border-radius:14px;padding:9px 12px;border:1px solid rgba(255,140,0,.22);background:linear-gradient(90deg,rgba(255,140,0,.10),rgba(255,255,255,.035));color:var(--pivot);font-weight:900;letter-spacing:.05em;font-size:13px}
    .empty-chip{display:inline-flex;align-items:center;justify-content:center;width:100%;border-radius:14px;padding:9px 12px;border:1px dashed var(--border-sub);color:var(--text-dim);opacity:.72}
    .restriction-panel{border-color:var(--border-sub);background:linear-gradient(180deg,rgba(255,59,59,.075),transparent 48%),rgba(8,11,16,.50);transform-origin:top center}
    body.light-mode .restriction-panel{background:rgba(255,255,255,.64)}
    .restriction-card{border:1px solid var(--border-sub);border-radius:22px;background:rgba(255,255,255,.045);box-shadow:inset 0 1px 0 rgba(255,255,255,.08)}
    body.light-mode .restriction-card{background:rgba(248,250,252,.78)}
    .restriction-card .shift-badge{min-width:68px;height:56px;font-size:30px}
    .signature-line{height:1px;background:linear-gradient(90deg,transparent,var(--start),rgba(124,58,237,.8),transparent);opacity:.7}
    @keyframes staggerFade{from{opacity:0;transform:translateY(18px) scale(.985);filter:blur(8px)}to{opacity:1;transform:translateY(0) scale(1);filter:blur(0)}}
    @keyframes lightSweep{0%,62%{transform:translateX(-72%);opacity:0}72%{opacity:.72}100%{transform:translateX(72%);opacity:0}}
    @media (max-width:420px){.hero-title{font-size:1.05rem;letter-spacing:.06em}.chrono-input{min-height:46px;font-size:16px}.shift-badge{min-width:64px;height:54px;font-size:30px}.restriction-card .shift-badge{min-width:58px;height:50px;font-size:27px}.numeric-data{letter-spacing:.03em}}
    @media (prefers-reduced-motion:reduce){*,*:before,*:after{animation-duration:.01ms!important;animation-iteration-count:1!important;scroll-behavior:auto!important;transition-duration:.01ms!important}}
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    const processTaiwanCalendar = (jsonData) => {
      let workDict = {}; let holidayMap = new Map();
      const workingDaysList = jsonData.filter(row => {
        let isHolidayAdj = row.isHoliday;
        const desc = row.description || "";
        if (desc.includes("補行上班") || desc.includes("調整上班")) isHolidayAdj = true;
        else if (desc.includes("調整放假")) isHolidayAdj = false;
        return isHolidayAdj === false;
      });
      workingDaysList.forEach(row => { workDict[parseInt(row.date.substring(4, 6), 10)] = (workDict[parseInt(row.date.substring(4, 6), 10)] || 0) + 1; });
      let holidays = jsonData.filter(row => {
        const desc = row.description || "";
        return desc.trim() !== "" && !desc.includes("補假") && !desc.includes("放假") && !desc.includes("補行上班") && !desc.includes("調整放假") && !desc.includes("調整上班");
      });
      let processedHolidays = holidays.map(row => {
        let desc = row.description; const dStr = row.date;
        if (dStr.endsWith("0101")) desc = "新年"; else if (dStr.endsWith("0228")) desc = "228"; else if (dStr.endsWith("0928")) desc = "教師節"; else if (dStr.endsWith("1025")) desc = "光復節"; else if (desc.includes("除夕")) desc = "除夕";
        return { y: parseInt(dStr.substring(0,4), 10), m: parseInt(dStr.substring(4,6), 10), d: parseInt(dStr.substring(6,8), 10), desc };
      });
      const springHolidays = processedHolidays.filter(h => h.desc === "春節").sort((a,b) => new Date(a.y, a.m-1, a.d) - new Date(b.y, b.m-1, b.d));
      springHolidays.forEach((h, idx) => { if(idx === 0) h.desc = "初一"; if(idx === 1) h.desc = "初二"; if(idx === 2) h.desc = "初三"; });
      const xiaonianye = processedHolidays.filter(h => h.desc === "除夕").map(h => {
        let prevDay = new Date(h.y, h.m-1, h.d); prevDay.setDate(prevDay.getDate() - 1);
        return { y: prevDay.getFullYear(), m: prevDay.getMonth() + 1, d: prevDay.getDate(), desc: "小年夜" };
      });
      processedHolidays.concat(xiaonianye).forEach(h => holidayMap.set(`${h.y}/${h.m}/${h.d}`, h.desc));
      return { workDict, holidayMap };
    };

    const calculateShiftData = (rocYear, month, shiftType, holidayMap, workDict, isManual, manualWorkingDays, manualHolidaysText) => {
      const year = rocYear + 1911; const baseDate = new Date(2026, 0, 1);
      const cycleHours = [8, 8, 6.5, 9, 9, 9, 0, 0, 8.5, 7, 7, 0];
      const cycleCodes = [2, 2, 2, 1, 1, 1, 0, 0, 3, 3, 3, 0];
      const cycleLabels = ["(二值)", "(二值)", "(二連一)", "(一值)", "(一值)", "(一值)", "(空班)", "(空班)", "(三值第一)", "(三值)", "(三值)", "(空班)"];
      const offset = { 'A': 0, 'B': 9, 'C': 6, 'D': 3 }[shiftType];
      const daysInMonth = new Date(year, month, 0).getDate();
      let totalHours = 0, handoverHours = 0, holidayHours = 0, monthHolidays = [];
      let manualHolidayDates = isManual ? manualHolidaysText.split(/[,，]/).map(s => s.trim().split(' ')[0]) : [];
      for (let day = 1; day <= daysInMonth; day++) {
        const currentDate = new Date(year, month - 1, day);
        const cycleIndex = ((Math.round((currentDate - baseDate) / 864e5) % 12) + 12 + offset) % 12;
        totalHours += cycleHours[cycleIndex]; if (cycleCodes[cycleIndex] > 0) handoverHours += 0.5;
        const dateKey = `${year}/${month}/${day}`; const shortDateKey = `${month}/${day}`;
        if (!isManual && holidayMap.has(dateKey)) {
          holidayHours += Math.min(cycleHours[cycleIndex], 8);
          monthHolidays.push(`${shortDateKey} ${holidayMap.get(dateKey)}${cycleLabels[cycleIndex]}`);
        } else if (isManual && manualHolidayDates.includes(shortDateKey)) {
          holidayHours += Math.min(cycleHours[cycleIndex], 8);
          const found = manualHolidaysText.split(/[,，]/).find(s => s.trim().startsWith(shortDateKey));
          monthHolidays.push(`${(found || shortDateKey).trim()}${cycleLabels[cycleIndex]}`);
        }
      }
      const gap = totalHours - (isManual ? manualWorkingDays : (workDict[month] || 0)) * 8 - holidayHours;
      return { shift: shiftType, substituteInfo: gap >= 0 ? `可代 ${46 - gap - handoverHours}HR` : `少 ${Math.abs(gap)}HR`, isSubstitutable: gap >= 0, monthHolidays, gap };
    };

    const accentMap = {
      A: { accent:'var(--color-A)', glow:'rgba(0,242,255,.28)', aura:'rgba(0,242,255,.14)' },
      B: { accent:'var(--color-B)', glow:'rgba(57,255,20,.23)', aura:'rgba(57,255,20,.13)' },
      C: { accent:'var(--color-C)', glow:'rgba(255,140,0,.25)', aura:'rgba(255,140,0,.13)' },
      D: { accent:'var(--color-D)', glow:'rgba(255,228,94,.22)', aura:'rgba(255,228,94,.12)' }
    };

    const App = () => {
      const now = new Date();
      const [rocYear, setRocYear] = useState(now.getFullYear() - 1911);
      const [month, setMonth] = useState(now.getMonth() + 1);
      const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') !== 'light');
      const [parsedData, setParsedData] = useState({ workDict: {}, holidayMap: new Map() });
      const [loading, setLoading] = useState(false);
      const [isManual, setIsManual] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      const [manualWorkingDays, setManualWorkingDays] = useState(20);
      const [manualHolidaysText, setManualHolidaysText] = useState("");
      const [scrollDepth, setScrollDepth] = useState(0);

      useEffect(() => {
        document.body.classList.toggle('light-mode', !isDarkMode);
        localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      }, [isDarkMode]);

      useEffect(() => {
        const fetchApi = async () => {
          setLoading(true); setErrorMsg(""); setIsManual(false);
          try {
            const res = await fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${rocYear + 1911}.json`);
            if(!res.ok) throw new Error();
            setParsedData(processTaiwanCalendar(await res.json()));
          } catch {
            setErrorMsg(`⚠️ 查無 ${rocYear} 年資料，已切換手動模式`);
            setIsManual(true);
          } finally { setLoading(false); }
        };
        fetchApi();
      }, [rocYear]);

      useEffect(() => {
        const onScroll = () => setScrollDepth(Math.min(window.scrollY, 420));
        onScroll(); window.addEventListener('scroll', onScroll, { passive: true });
        return () => window.removeEventListener('scroll', onScroll);
      }, []);

      const shiftResults = useMemo(() => ['A', 'B', 'C', 'D'].map(s => calculateShiftData(rocYear, month, s, parsedData.holidayMap, parsedData.workDict, isManual, manualWorkingDays, manualHolidaysText)), [rocYear, month, parsedData, isManual, manualWorkingDays, manualHolidaysText]);

      const yearlyShortageData = useMemo(() => {
        if(isManual || Object.keys(parsedData.workDict).length === 0) return null;
        const summary = { A: [], B: [], C: [], D: [] };
        for (let m = 1; m <= 12; m++) {
          ['A', 'B', 'C', 'D'].forEach(s => {
            const res = calculateShiftData(rocYear, m, s, parsedData.holidayMap, parsedData.workDict, false, 0, "");
            if (res.gap < 0) summary[s].push(`${m}月少${Math.abs(res.gap)}HR`);
          });
        }
        return summary;
      }, [rocYear, parsedData, isManual]);

      const parallaxStyle = { transform: `translateY(${-scrollDepth * 0.035}px)`, transition: 'transform .08s linear' };

      return (
        <main className="app-shell">
          <section className="hero-panel p-5 md:p-8 mb-5 md:mb-7">
            <div className="relative z-10 flex flex-col gap-5">
              <div className="flex items-start justify-between gap-3">
                <div className="min-w-0">
                  <h1 className="hero-title neon-text text-xl md:text-4xl font-black tracking-[0.13em] leading-tight whitespace-nowrap">✦ 複值&quot;代班時數&quot;查詢系統 ✦</h1>
                </div>
                <button className="btn-toggle-inline shrink-0" onClick={() => setIsDarkMode(!isDarkMode)} aria-label="切換深淺色模式">{isDarkMode ? "☀️" : "🌙"}</button>
              </div>

              <div className="time-anchor p-4 md:p-5">
                <div className="grid grid-cols-1 lg:grid-cols-[1fr_auto] gap-4 lg:items-end">
                  <div>
                    <p className="text-2xl md:text-4xl font-black numeric-data mb-4">{rocYear} 年 {month} 月</p>
                    <div className="grid grid-cols-2 gap-3 md:max-w-md relative">
                      <div className="field-shell">
                        <label>民國年份</label>
                        <input type="number" value={rocYear} onChange={e => setRocYear(Number(e.target.value))} className="chrono-input" />
                      </div>
                      <div className="field-shell">
                        <label>月份</label>
                        <select value={month} onChange={e => setMonth(Number(e.target.value))} className="chrono-input appearance-none">
                          {[...Array(12)].map((_, i) => <option key={i+1} value={i+1}>{i+1} 月</option>)}
                        </select>
                      </div>
                      {errorMsg && <div className="col-span-2 text-[var(--color-Alert)] text-[11px] mt-1 font-black tracking-[.06em]">{errorMsg}</div>}
                    </div>
                  </div>
                  <div className="notice-line px-4 py-3 md:min-w-[230px]"><p className="text-[11px] md:text-xs font-black tracking-[.11em] leading-relaxed">⚠️ 適用民國115年後<br />日後修正實施條例即不適用。</p></div>
                </div>
                {isManual && (
                  <div className="manual-panel mt-4 p-3 md:p-4 grid grid-cols-1 md:grid-cols-[.7fr_1.7fr] gap-3">
                    <div className="field-shell"><label>保養天數</label><input type="number" value={manualWorkingDays} onChange={e=>setManualWorkingDays(Number(e.target.value))} className="chrono-input text-sm" /></div>
                    <div className="field-shell"><label>假日清單範例：4/4 兒童節</label><input type="text" value={manualHolidaysText} onChange={e=>setManualHolidaysText(e.target.value)} className="chrono-input text-sm text-left px-4" /></div>
                  </div>
                )}
              </div>
            </div>
          </section>

          <section className="flow-panel p-4 md:p-6 mb-6 md:mb-8" style={parallaxStyle}>
            {loading && !isManual ? (
              <div className="relative z-10 text-center py-24 text-[var(--start)] animate-pulse tracking-[.22em] font-mono font-black">[ 系統同步中 SYNCING... ]</div>
            ) : (
              <div className="relative z-10 grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4">
                {shiftResults.map((row, idx) => {
                  const accent = accentMap[row.shift];
                  const statusColor = row.isSubstitutable ? 'var(--ok)' : 'var(--alert)';
                  return (
                    <article key={row.shift} className="shift-card p-4 md:p-5" style={{ '--accent': accent.accent, '--accentGlow': accent.glow, '--accentAura': accent.aura, animationDelay: `${idx * 80}ms` }}>
                      <div className="flex items-start justify-between gap-3 mb-5">
                        <span className={`shift-badge color-${row.shift}`}>{row.shift}</span>
                        <span className="status-pill" style={{ color: statusColor }}>{row.isSubstitutable ? '可代班' : '不可代班'}</span>
                      </div>
                      <div className="mb-5">
                        <p className="text-[10px] text-[var(--text-dim)] tracking-[.22em] font-black mb-2">代班資訊</p>
                        <div className={`numeric-data text-3xl md:text-4xl font-black ${row.isSubstitutable ? 'color-B' : 'color-Alert'}`}>{row.substituteInfo}</div>
                      </div>
                      <div>
                        <p className="text-[10px] text-[var(--text-dim)] tracking-[.22em] font-black mb-2">國定假日</p>
                        <div className="flex flex-col gap-2 min-h-[44px]">{row.monthHolidays.length > 0 ? row.monthHolidays.map((h, i) => <div key={i} className="holiday-chip">{h}</div>) : <span className="empty-chip">本月無對位節日</span>}</div>
                      </div>
                    </article>
                  );
                })}
              </div>
            )}
          </section>

          {yearlyShortageData && !isManual && (
            <section className="restriction-panel p-4 md:p-6 mb-8" style={{ transform: `translateY(${scrollDepth * .018}px) scale(${Math.max(.985, 1 - scrollDepth * .00003)})` }}>
              <h2 className="text-lg md:text-2xl font-black tracking-[.14em] mb-5 md:mb-6 text-center">✦ {rocYear}年度【不可代班】資訊欄 ✦</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-3 md:gap-4 font-mono">
                {['A', 'B', 'C', 'D'].map(shift => {
                  const accent = accentMap[shift];
                  return (
                    <div key={shift} className="restriction-card p-4 flex flex-col items-center" style={{ '--accentGlow': accent.glow, '--accentAura': accent.aura }}>
                      <span className={`shift-badge color-${shift} w-16 text-center mb-4`}>{shift}</span>
                      <div className="flex flex-col items-center justify-start w-full min-h-[60px] gap-2">{yearlyShortageData[shift].length > 0 ? yearlyShortageData[shift].map((item, idx) => <div key={idx} className="color-Alert text-[12px] md:text-base font-black tracking-[.05em]">{item}</div>) : <div className="text-[var(--text-main)] text-[12px] md:text-sm font-black opacity-90">均可代班</div>}</div>
                    </div>
                  );
                })}
              </div>
            </section>
          )}

          <footer className="mt-10 text-center pb-4">
            <div className="inline-block relative px-6">
              <span className="text-[var(--text-dim)] text-[9px] uppercase tracking-[.3em] block mb-1">System Designed By</span>
              <div className="text-xl md:text-2xl font-black tracking-[.1em] text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600"><span>複值</span><span style={{ fontFamily:"'RemachineScript', sans-serif", fontSize:"1.3em", verticalAlign:"middle" }}>D-Joe.T</span></div>
              <div className="signature-line absolute -bottom-1 left-0 w-full"></div>
            </div>
          </footer>
        </main>
      );
    };
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
