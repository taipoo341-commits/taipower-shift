<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>複值"代班時數"查詢系統</title>
  
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#0d0f12">
  <link rel="icon" type="image/png" href="./icon.png">
  <link rel="apple-touch-icon" href="./icon.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="台電排班">

  <script src="https://cdn.tailwindcss.com"></script>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style> 
    :root {
      --bg-body: #0d0f12; --bg-card: #0a0c10; --bg-input: #12161c;
      --text-main: #e0e0e0; --text-dim: #9ca3af;
      --border-color: rgba(0, 240, 255, 0.3); --border-sub: rgba(255, 255, 255, 0.05);
      --hover-bg: rgba(0, 240, 255, 0.05);
      --neon-glow: 0 0 10px rgba(0, 240, 255, 0.8), 0 0 20px rgba(0, 240, 255, 0.4);
      --neon-shadow: 0 0 15px rgba(0, 240, 255, 0.1), inset 0 0 20px rgba(0, 240, 255, 0.05);
      --color-A: #00F0FF; --color-B: #00FF41; --color-C: #FF9D00; --color-D: #FFDD00; --color-Alert: #FF3333;
    }

    body.light-mode {
      --bg-body: #f1f5f9; --bg-card: #ffffff; --bg-input: #f8fafc;
      --text-main: #0f172a; --text-dim: #64748b;
      --border-color: #cbd5e1; --border-sub: #e2e8f0; --hover-bg: #f1f5f9;
      --neon-glow: none;
      --neon-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
      --color-A: #0891b2; --color-B: #16a34a; --color-C: #ea580c; --color-D: #ca8a04; --color-Alert: #dc2626;
    }

    @font-face { font-family: 'RemachineScript'; src: url('./RemachineScript_Personal_Use.ttf') format('truetype'); }

    body { background-color: var(--bg-body); color: var(--text-main); font-family: 'Segoe UI', system-ui, sans-serif; transition: all 0.3s ease; }
    
    /* 標題與副標題容器 */
    .header-section { margin-top: 1rem; margin-bottom: 2rem; position: relative; }
    .neon-text { color: var(--color-A); text-shadow: var(--neon-glow); }
    .neon-border { border: 1px solid var(--border-color); box-shadow: var(--neon-shadow); background-color: var(--bg-card); }
    
    .shift-badge { padding: 4px 12px; border-radius: 6px; font-weight: 900; border: 2px solid; background: rgba(0,0,0,0.1); }
    .color-A { color: var(--color-A); border-color: var(--color-A); }
    .color-B { color: var(--color-B); border-color: var(--color-B); }
    .color-C { color: var(--color-C); border-color: var(--color-C); }
    .color-D { color: var(--color-D); border-color: var(--color-D); }
    .color-Alert { color: var(--color-Alert); }

    .hide-scrollbar::-webkit-scrollbar { display: none; }
    
    /* 按鈕樣式優化：嵌入副標題右側 */
    .btn-toggle-inline {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; background: var(--bg-card); border: 1px solid var(--border-color);
      color: var(--text-main); cursor: pointer; font-size: 1rem;
      box-shadow: var(--neon-shadow); transition: all 0.2s;
    }
  </style>
</head>
<body class="min-h-screen p-2 md:p-8 flex justify-center">

  <div id="root" class="w-full max-w-7xl"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- 計算邏輯保持不變 ---
    const processTaiwanCalendar = (jsonData) => {
      let workDict = {}; let holidayMap = new Map(); 
      const workingDaysList = jsonData.filter(row => {
        let isHolidayAdj = row.isHoliday;
        const desc = row.description || "";
        if (desc.includes("補行上班") || desc.includes("調整上班")) isHolidayAdj = true;
        else if (desc.includes("調整放假")) isHolidayAdj = false;
        return isHolidayAdj === false;
      });
      workingDaysList.forEach(row => { workDict[parseInt(row.date.substring(4, 6), 10)] = (workDict[parseInt(row.date.substring(4, 6), 10)] || 0) + 1; });
      let holidays = jsonData.filter(row => {
        const desc = row.description || "";
        return desc.trim() !== "" && !desc.includes("補假") && !desc.includes("放假") && !desc.includes("補行上班") && !desc.includes("調整放假") && !desc.includes("調整上班");
      });
      let processedHolidays = holidays.map(row => {
        let desc = row.description; const dStr = row.date;
        if (dStr.endsWith("0101")) desc = "新年"; else if (dStr.endsWith("0228")) desc = "228"; else if (dStr.endsWith("0928")) desc = "教師節"; else if (dStr.endsWith("1025")) desc = "光復節"; else if (desc.includes("除夕")) desc = "除夕";
        return { y: parseInt(dStr.substring(0,4), 10), m: parseInt(dStr.substring(4,6), 10), d: parseInt(dStr.substring(6,8), 10), desc };
      });
      const springHolidays = processedHolidays.filter(h => h.desc === "春節").sort((a,b) => new Date(a.y, a.m-1, a.d) - new Date(b.y, b.m-1, b.d));
      springHolidays.forEach((h, idx) => { if(idx === 0) h.desc = "初一"; if(idx === 1) h.desc = "初二"; if(idx === 2) h.desc = "初三"; });
      const xiaonianye = processedHolidays.filter(h => h.desc === "除夕").map(h => {
        let prevDay = new Date(h.y, h.m-1, h.d); prevDay.setDate(prevDay.getDate() - 1);
        return { y: prevDay.getFullYear(), m: prevDay.getMonth() + 1, d: prevDay.getDate(), desc: "小年夜" };
      });
      processedHolidays.concat(xiaonianye).forEach(h => holidayMap.set(`${h.y}/${h.m}/${h.d}`, h.desc));
      return { workDict, holidayMap };
    };

    const calculateShiftData = (rocYear, month, shiftType, holidayMap, workDict, isManual, manualWorkingDays, manualHolidaysText) => {
      const year = Number(rocYear) + 1911; const baseDate = new Date(2026, 0, 1);
      const cycleHours = [8, 8, 6.5, 9, 9, 9, 0, 0, 8.5, 7, 7, 0];
      const cycleCodes = [2, 2, 2, 1, 1, 1, 0, 0, 3, 3, 3, 0];
      const cycleLabels = ["(二值)", "(二值)", "(二連一)", "(一值)", "(一值)", "(一值)", "(空班)", "(空班)", "(三值第一)", "(三值)", "(三值)", "(空班)"];
      const offset = { 'A': 0, 'B': 9, 'C': 6, 'D': 3 }[shiftType];
      const daysInMonth = new Date(year, month, 0).getDate();
      let totalHours = 0, handoverHours = 0, holidayHours = 0, monthHolidays = []; 
      let manualHolidayDates = isManual ? manualHolidaysText.split(/[,，]/).map(s => s.trim().split(' ')[0]) : [];
      for (let day = 1; day <= daysInMonth; day++) {
        const currentDate = new Date(year, month - 1, day);
        const cycleIndex = ((Math.round((currentDate - baseDate) / 864e5) % 12) + 12 + offset) % 12;
        totalHours += cycleHours[cycleIndex]; if (cycleCodes[cycleIndex] > 0) handoverHours += 0.5;
        const dateKey = `${year}/${month}/${day}`; const shortDateKey = `${month}/${day}`;
        if (!isManual && holidayMap.has(dateKey)) {
          holidayHours += Math.min(cycleHours[cycleIndex], 8);
          monthHolidays.push(`${shortDateKey} ${holidayMap.get(dateKey)}${cycleLabels[cycleIndex]}`);
        } else if (isManual && manualHolidayDates.includes(shortDateKey)) {
          holidayHours += Math.min(cycleHours[cycleIndex], 8);
          const found = manualHolidaysText.split(/[,，]/).find(s => s.trim().startsWith(shortDateKey));
          monthHolidays.push(`${(found || shortDateKey).trim()}${cycleLabels[cycleIndex]}`);
        }
      }
      const gap = totalHours - (isManual ? manualWorkingDays : (workDict[month] || 0)) * 8 - holidayHours;
      return { shift: shiftType, substituteInfo: gap >= 0 ? `可代 ${46 - gap - handoverHours}HR` : `少 ${Math.abs(gap)}HR`, isSubstitutable: gap >= 0, monthHolidays, gap };
    };

    const App = () => {
      const now = new Date();
      const [rocYear, setRocYear] = useState(now.getFullYear() - 1911); 
      const [month, setMonth] = useState(now.getMonth() + 1);
      const [isDarkMode, setIsDarkMode] = useState(() => localStorage.getItem('theme') !== 'light');
      const [parsedData, setParsedData] = useState({ workDict: {}, holidayMap: new Map() });
      const [loading, setLoading] = useState(false);
      const [isManual, setIsManual] = useState(false);
      const [errorMsg, setErrorMsg] = useState("");
      const [manualWorkingDays, setManualWorkingDays] = useState(20);
      const [manualHolidaysText, setManualHolidaysText] = useState("");

      const handleRocYearChange = (e) => {
        const cleanValue = e.target.value.replace(/\D/g, "").slice(0, 3);
        setRocYear(cleanValue === "" ? "" : Number(cleanValue));
      };

      const selectInputText = (e) => {
        e.target.select();
      };

      useEffect(() => {
        document.body.classList.toggle('light-mode', !isDarkMode);
        localStorage.setItem('theme', isDarkMode ? 'dark' : 'light');
      }, [isDarkMode]);

      useEffect(() => {
        const fetchApi = async () => {
          setLoading(true); setErrorMsg(""); setIsManual(false);
          try {
            const res = await fetch(`https://cdn.jsdelivr.net/gh/ruyut/TaiwanCalendar/data/${Number(rocYear) + 1911}.json`);
            if(!res.ok) throw new Error();
            setParsedData(processTaiwanCalendar(await res.json()));
          } catch { setErrorMsg(`⚠️ 查無 ${rocYear} 年資料，已切換手動模式`); setIsManual(true); }
          finally { setLoading(false); }
        };
        fetchApi();
      }, [rocYear]);

      const shiftResults = useMemo(() => ['A', 'B', 'C', 'D'].map(s => calculateShiftData(rocYear, month, s, parsedData.holidayMap, parsedData.workDict, isManual, manualWorkingDays, manualHolidaysText)), [rocYear, month, parsedData, isManual, manualWorkingDays, manualHolidaysText]);
      const yearlyShortageData = useMemo(() => {
        if(isManual || Object.keys(parsedData.workDict).length === 0) return null;
        const summary = { A: [], B: [], C: [], D: [] };
        for (let m = 1; m <= 12; m++) {
          ['A', 'B', 'C', 'D'].forEach(s => {
            const res = calculateShiftData(rocYear, m, s, parsedData.holidayMap, parsedData.workDict, false, 0, "");
            if (res.gap < 0) summary[s].push(`${m}月少${Math.abs(res.gap)}HR`);
          });
        }
        return summary;
      }, [rocYear, parsedData, isManual]);

      return (
        <div className="w-full">
          <div className="header-section text-center">
            {/* 第一行：標題全寬，不換行 */}
            <h1 className="text-xl md:text-4xl font-bold neon-text tracking-widest whitespace-nowrap">✦ 複值"代班時數"查詢系統 ✦</h1>
            
            {/* 第二行：副標題與按鈕並列 */}
            <div className="flex items-center justify-between mt-3 px-2 md:px-0">
               <div className="w-9 invisible md:hidden"></div> {/* 手機端維持文字置中用的佔位 */}
               <p className="text-[var(--text-dim)] text-[10px] md:text-sm tracking-[0.2em] font-mono uppercase text-center flex-grow">
                 TAIPOWER SHIFT SYSTEM
               </p>
               <button className="btn-toggle-inline" onClick={() => setIsDarkMode(!isDarkMode)}>
                 {isDarkMode ? "☀️" : "🌙"}
               </button>
            </div>
          </div>

          <div className="neon-border rounded-lg p-4 md:p-6 mb-6 md:mb-8">
            <div className="flex flex-col md:flex-row gap-4 md:gap-8 items-start md:items-end">
              <div className="flex gap-3 w-full md:w-auto relative">
                <div className="flex-1 md:flex-none">
                  <label className="block text-[10px] md:text-sm text-[var(--text-main)] font-bold mb-2 tracking-widest">民國年份</label>
                  <input type="text" inputMode="numeric" maxLength="3" pattern="[0-9]*" value={rocYear} onFocus={selectInputText} onClick={selectInputText} onChange={handleRocYearChange} className="w-full bg-[var(--bg-input)] border border-[var(--border-color)] rounded-md px-2 py-2 text-[var(--text-main)] outline-none focus:border-[var(--color-A)] text-center font-mono text-sm md:text-lg font-bold" />
                  {errorMsg && <div className="text-[var(--color-Alert)] text-[10px] mt-1 absolute font-bold whitespace-nowrap">{errorMsg}</div>}
                </div>
                <div className="flex-1 md:flex-none">
                  <label className="block text-[10px] md:text-sm text-[var(--text-main)] font-bold mb-2 tracking-widest">月份</label>
                  <select value={month} onChange={e => setMonth(Number(e.target.value))} className="w-full bg-[var(--bg-input)] border border-[var(--border-color)] rounded-md px-2 py-2 text-[var(--text-main)] outline-none focus:border-[var(--color-A)] text-center font-mono appearance-none text-sm md:text-lg font-bold">
                    {[...Array(12)].map((_, i) => <option key={i+1} value={i+1}>{i+1} 月</option>)}
                  </select>
                </div>
              </div>
              
              {isManual && (
                <div className="flex-1 w-full bg-[var(--color-Alert)]/10 border border-[var(--color-Alert)]/30 p-3 rounded-md shadow-inner flex flex-col md:flex-row gap-3">
                    <div className="flex-1">
                      <label className="text-[10px] text-[var(--text-dim)] block mb-1">保養天數</label>
                      <input type="number" value={manualWorkingDays} onChange={e=>setManualWorkingDays(Number(e.target.value))} className="w-full bg-[var(--bg-input)] text-[var(--text-main)] text-xs p-2 border border-[var(--border-sub)] rounded outline-none" />
                    </div>
                    <div className="flex-[2]">
                      <label className="text-[10px] text-[var(--text-dim)] block mb-1">假日清單 (4/4 兒童節)</label>
                      <input type="text" value={manualHolidaysText} onChange={e=>setManualHolidaysText(e.target.value)} className="w-full bg-[var(--bg-input)] text-[var(--text-main)] text-xs p-2 border border-[var(--border-sub)] rounded outline-none" />
                    </div>
                </div>
              )}

              <div className="w-full md:w-auto md:ml-auto border-l-2 border-[var(--color-C)]/50 pl-3 py-1">
                <p className="text-[var(--color-C)] opacity-90 text-[9px] md:text-xs font-mono leading-relaxed">
                  ⚠️ 適用民國115年後<br />日後修正實施條例即不適用。
                </p>
              </div>
            </div>
          </div>

          <div className="neon-border rounded-lg w-full overflow-hidden">
            {loading && !isManual ? (
              <div className="text-center py-24 text-[var(--color-A)] animate-pulse tracking-widest font-mono font-bold">[ 系統同步中 SYNCING... ]</div>
            ) : (
              <div className="w-full hide-scrollbar overflow-x-auto">
                <table className="w-full text-center border-collapse">
                  <thead className="bg-[var(--bg-input)] text-[var(--text-dim)] border-b border-[var(--border-sub)]">
                    <tr>
                      <th className="py-3 px-1 md:py-5 font-bold tracking-widest text-[13px] md:text-lg">班別</th>
                      <th className="py-3 px-1 md:py-5 font-bold tracking-widest text-[13px] md:text-lg">代班資訊</th>
                      <th className="py-3 px-1 md:py-5 font-bold tracking-widest text-[11px] md:text-base">國定假日</th>
                    </tr>
                  </thead>
                  <tbody className="font-mono text-[var(--text-main)]">
                    {shiftResults.map(row => (
                      <tr key={row.shift} className="cyber-table-row">
                        <td className="py-4 align-middle"><span className={`shift-badge color-${row.shift} text-[18px] md:text-2xl`}>{row.shift}</span></td>
                        <td className={`py-4 text-[16px] md:text-2xl font-bold tracking-widest align-middle ${row.isSubstitutable ? `color-${row.shift}` : 'color-Alert'}`}>{row.substituteInfo}</td>
                        <td className="py-4 font-bold tracking-wider align-middle text-left md:text-center px-2">
                          {row.monthHolidays.length > 0 ? row.monthHolidays.map((h, i) => <div key={i} className={`text-[11px] md:text-xl color-${row.shift}`}>{h}</div>) : <span className="text-sm text-[var(--text-dim)] opacity-50">-</span>}
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
              </div>
            )}
          </div>

          {yearlyShortageData && !isManual && (
            <div className="neon-border rounded-lg p-4 md:p-6 mt-6 md:mt-8 w-full">
              <h2 className="text-lg md:text-xl font-bold text-[var(--text-main)] mb-6 text-center tracking-widest border-b border-[var(--border-sub)] pb-4">✦ {rocYear}年度【不可代班】資訊欄 ✦</h2>
              <div className="grid grid-cols-2 md:grid-cols-4 gap-4 font-mono">
                {['A', 'B', 'C', 'D'].map(shift => (
                  <div key={shift} className="flex flex-col items-center bg-[var(--bg-input)] border border-[var(--border-sub)] rounded-lg p-4 shadow-inner">
                    <span className={`shift-badge color-${shift} w-16 text-center mb-4`}>{shift}</span>
                    <div className="flex flex-col items-center justify-start w-full min-h-[60px]">
                      {yearlyShortageData[shift].length > 0 ? yearlyShortageData[shift].map((item, idx) => <div key={idx} className="color-Alert text-[12px] md:text-base font-bold mb-2">{item}</div>) : <div className="text-[var(--text-main)] text-[12px] md:text-sm font-bold opacity-90">均可代班</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          <div className="mt-10 text-center pb-4">
            <div className="inline-block relative">
              <span className="text-[var(--text-dim)] text-[9px] uppercase tracking-[0.3em] block mb-1">System Designed By</span>
              <div className="text-xl md:text-2xl font-bold tracking-[0.1em] text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-blue-500 to-purple-600">
                <span>複值</span><span style={{ fontFamily: "'RemachineScript', sans-serif", fontSize: "1.3em", verticalAlign: "middle" }}>D-Joe.T</span>
              </div>
              <div className="absolute -bottom-1 left-0 w-full h-[1px] bg-gradient-to-r from-transparent via-cyan-500 to-transparent opacity-60"></div>
            </div>
          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
